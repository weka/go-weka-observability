name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.22.2

      - name: Compile
        run: make build

      - name: Vet
        run: make vet

      - name: Prepare lint workspace
        run: go clean -modcache

      - name: Install & Run linter
        uses: golangci/golangci-lint-action@v2
        with:
          version: v1.58.0

      - name: Test
        run: make test
