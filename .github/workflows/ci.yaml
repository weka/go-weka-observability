name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Compile
        run: make build

      - name: Vet
        run: make vet

      - name: Prepare lint workspace
        run: go clean -modcache

      - name: Install & Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1

      - name: Test
        run: make test
