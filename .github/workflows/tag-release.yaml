name: Tag and Release

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  actions: read

jobs:
  test:
    name: Run Tests Before Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "./go.mod"
          cache-dependency-path: "./go.sum"

      - name: Install dependencies
        run: make tidy

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5
          only-new-issues: true

      - name: Run tests
        run: |
          go test ./... -v -race -coverprofile=coverage.out

      - name: Build verification
        run: |
          go build ./internal/version

      - name: Test version function
        run: |
          go test ./internal/version -v

  tag:
    name: Auto Tag Version
    runs-on: ubuntu-latest
    needs: test # Only tag after tests pass
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      tag_created: ${{ steps.tag_version.outputs.tag != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: "0" # Required for semantic versioning
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true # Tags will be v1.2.3 format
          DEFAULT_BUMP: patch # Default increment if no tag in commit
          RELEASE_BRANCHES: main # Only main branch generates releases
          TAG_CONTEXT: repo # Use repository context for versioning
          DRY_RUN: false # Actually create the tags
          VERBOSE: true # Enable verbose logging

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## What's Changed

            This release was automatically generated from the latest changes merged to the main branch.

            ### Version Information
            - **Tag**: ${{ needs.tag.outputs.new_tag }}
            - **Go Module**: `go get github.com/weka/go-weka-observability@${{ needs.tag.outputs.new_tag }}`
            - **Library Version**: `GetInstrumentationVersion()` will return `"${{ needs.tag.outputs.new_tag }}"`

            ### Usage
            ```bash
            go get github.com/weka/go-weka-observability@${{ needs.tag.outputs.new_tag }}
            ```

            The go-weka-observability library will automatically provide the correct version via `debug.ReadBuildInfo()`.

            ### Full Changelog

            **Note**: See below for automatically generated release notes.
